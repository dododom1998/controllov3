<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Contatore Ultra MAX</title>
<style>
  :root {
    --bg-main: #000000;
    --bg-card: #141414;
    --border-card: #262626;
    --text-title: #94a3b8;
    --pos-highlight: #450a0a;
    --pos-border: #991b1b;
    --text-main: #f8fafc;
    --accent: #38bdf8;
  }

  body.red-mode {
    --bg-card: #1c0505;
    --border-card: #450a0a;
    --text-title: #fca5a5;
    --pos-highlight: #6b0707;
    --pos-border: #b91c1c;
    --text-main: #fee2e2;
    --accent: #ef4444;
  }

  html, body {
    background-color: #000000;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text-main);
    -webkit-user-select: none;
    user-select: none;
    box-sizing: border-box;
  }

  .watch-container {
    padding: 4px 2px calc(30px + env(safe-area-inset-bottom)) 2px;
    display: flex;
    flex-direction: column;
    gap: 10px; /* Più spazio tra i blocchi */
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 6px;
    height: 24px;
  }
  .header h2 { font-size: 12px; margin: 0; color: var(--text-title); text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-mode {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: 50%;
    width: 22px; height: 22px;
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
  }

  .section-divider {
    font-size: 11px;
    font-weight: 900;
    color: var(--accent);
    text-transform: uppercase;
    text-align: left;
    padding-left: 6px;
    margin-top: 6px;
    border-left: 3px solid var(--accent);
  }

  /* BLOCCO COMANDO MAXI */
  .watch-row {
    display: flex;
    gap: 3px;
    height: 56px; /* Altezza massimizzata per il touch */
    width: 100%;
  }

  button {
    border: 0;
    height: 100%;
    font-weight: bold;
    touch-action: manipulation;
    cursor: pointer;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  button:active { opacity: 0.6; }

  /* TASTO MENO (30% Larghezza) */
  .btn-minus { 
    background: #262626; 
    color: #ef4444; 
    width: 28%; 
    font-size: 20px; 
  }
  
  /* TASTO PIÙ (72% Larghezza) con info interna */
  .btn-plus-main { 
    width: 72%; 
    background: #059669; 
    color: white; 
    padding: 2px 4px;
  }
  .btn-plus-sosta { 
    width: 72%; 
    background: #2563eb; 
    color: white; 
    padding: 2px 4px;
  }

  body.red-mode .btn-minus { background: #3b0707; color: #fca5a5; }
  body.red-mode .btn-plus-main { background: #064e3b; color: #a7f3d0; }
  body.red-mode .btn-plus-sosta { background: #1e3a8a; color: #bfdbfe; }

  /* Elementi di testo dentro il tastone */
  .btn-title {
    font-size: 9px;
    text-transform: uppercase;
    opacity: 0.85;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .btn-num {
    font-size: 24px;
    font-weight: 900;
    line-height: 1;
    margin-top: 1px;
  }

  /* EVIDENZIAZIONE POSTO HIGHLIGHT */
  .highlight .btn-plus-main {
    background: #b91c1c;
  }
  body.red-mode .highlight .btn-plus-main {
    background: #991b1b;
    border: 1px solid #ef4444;
  }

  /* OUTPUT IN FONDO */
  .summary-box {
    background: #070707;
    border: 1px solid #1a1a1a;
    border-radius: 10px;
    padding: 8px;
    font-size: 11px;
    font-family: monospace;
    text-align: left;
    white-space: pre-line;
    color: #38bdf8;
  }
  body.red-mode .summary-box { background: #110202; border-color: #2d0606; color: #f87171; }

  .footer-actions {
    display: flex;
    gap: 4px;
    height: 44px;
  }
  .btn-action { font-size: 14px; border-radius: 10px; color: white; flex: 1; }
  .wsp { background: #16a34a; }
  .cpy { background: #0284c7; }
  .cpy.success { background: #15803d !important; }
  .und { background: #4b5563; flex: 0.6; font-size: 16px; }
  .rst { background: #b45309; flex: 0.6; font-size: 16px; }

  body.red-mode .wsp { background: #064e3b; color: #a7f3d0; }
  body.red-mode .cpy { background: #0369a1; color: #bae6fd; }
  body.red-mode .und { background: #3f3f46; color: #d4d4d8; }
  body.red-mode .rst { background: #7c2d12; color: #ffedd5; }
</style>
</head>
<body>

<div class="watch-container">
  
  <div class="header">
    <h2>Memb. Ultra MAX</h2>
    <button class="btn-mode" id="mode-icon" onclick="toggleModalita()">🔴</button>
  </div>

  <div class="section-divider">Transito / Sosta</div>
  
  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('tgSosta',-1)">-</button>
    <button class="btn-plus-sosta" onclick="cambia('tgSosta',1)">
      <span class="btn-title">Targhe Sosta</span>
      <span class="btn-num" id="val-tgSosta">0</span>
    </button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('tg',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('tg',1)">
      <span class="btn-title">Occupanti Transito</span>
      <span class="btn-num" id="val-tg">0</span>
    </button>
  </div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('itaPos',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('itaPos',1)">
      <span class="btn-title">Ita Pos</span>
      <span class="btn-num" id="val-itaPos">0</span>
    </button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('itaNeg',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('itaNeg',1)">
      <span class="btn-title">Ita Neg</span>
      <span class="btn-num" id="val-itaNeg">0</span>
    </button>
  </div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('straPos',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('straPos',1)">
      <span class="btn-title">Stra Pos</span>
      <span class="btn-num" id="val-straPos">0</span>
    </button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('straNeg',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('straNeg',1)">
      <span class="btn-title">Stra Neg</span>
      <span class="btn-num" id="val-straNeg">0</span>
    </button>
  </div>

  <div class="section-divider">Posto di Controllo</div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('pdcTg',-1)">-</button>
    <button class="btn-plus-sosta" onclick="cambia('pdcTg',1)">
      <span class="btn-title">Veicoli PdC</span>
      <span class="btn-num" id="val-pdcTg">0</span>
    </button>
  </div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('pdcItaPos',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('pdcItaPos',1)">
      <span class="btn-title">PdC Ita Pos</span>
      <span class="btn-num" id="val-pdcItaPos">0</span>
    </button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('pdcItaNeg',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('pdcItaNeg',1)">
      <span class="btn-title">PdC Ita Neg</span>
      <span class="btn-num" id="val-pdcItaNeg">0</span>
    </button>
  </div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('pdcStraPos',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('pdcStraPos',1)">
      <span class="btn-title">PdC Stra Pos</span>
      <span class="btn-num" id="val-pdcStraPos">0</span>
    </button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('pdcStraNeg',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('pdcStraNeg',1)">
      <span class="btn-title">PdC Stra Neg</span>
      <span class="btn-num" id="val-pdcStraNeg">0</span>
    </button>
  </div>

  <div class="section-divider">Appiedati</div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('apItaPos',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('apItaPos',1)">
      <span class="btn-title">App Ita Pos</span>
      <span class="btn-num" id="val-apItaPos">0</span>
    </button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('apItaNeg',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('apItaNeg',1)">
      <span class="btn-title">App Ita Neg</span>
      <span class="btn-num" id="val-apItaNeg">0</span>
    </button>
  </div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('apStraPos',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('apStraPos',1)">
      <span class="btn-title">App Stra Pos</span>
      <span class="btn-num" id="val-apStraPos">0</span>
    </button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('apStraNeg',-1)">-</button>
    <button class="btn-plus-main" onclick="cambia('apStraNeg',1)">
      <span class="btn-title">App Stra Neg</span>
      <span class="btn-num" id="val-apStraNeg">0</span>
    </button>
  </div>

  <div class="section-divider">Output Report</div>
  <div class="summary-box" id="riepilogo">Nessun dato</div>

  <div class="footer-actions">
    <button class="btn-action und" id="btn-undo" onclick="annulla()" style="opacity:0.3;">↩︎</button>
    <button class="btn-action wsp" onclick="inviaWhatsApp()">💬</button>
    <button class="btn-action cpy" id="btn-copia" onclick="copiaTesto()">📋</button>
    <button class="btn-action rst" onclick="azzera()">🗑️</button>
  </div>

</div>

<script>
let datiSalvati = JSON.parse(localStorage.getItem("watchContatoreV1")) || {};
let dati = {
  tgSosta: Number(datiSalvati.tgSosta) || 0, tg: Number(datiSalvati.tg) || 0,
  itaNeg: Number(datiSalvati.itaNeg) || 0, itaPos: Number(datiSalvati.itaPos) || 0,
  straPos: Number(datiSalvati.straPos) || 0, straNeg: Number(datiSalvati.straNeg) || 0,
  apItaNeg: Number(datiSalvati.apItaNeg) || 0, apItaPos: Number(datiSalvati.apItaPos) || 0,
  apStraPos: Number(datiSalvati.apStraPos) || 0, apStraNeg: Number(datiSalvati.apStraNeg) || 0,
  pdcTg: Number(datiSalvati.pdcTg) || 0, pdcItaNeg: Number(datiSalvati.pdcItaNeg) || 0,
  pdcItaPos: Number(datiSalvati.pdcItaPos) || 0, pdcStraPos: Number(datiSalvati.pdcStraPos) || 0,
  pdcStraNeg: Number(datiSalvati.pdcStraNeg) || 0
};

let cronologiaAzioni = [];

function feedbackTattico() {
  if (navigator.vibrate) navigator.vibrate(25); // Vibrazione leggermente più decisa per il Watch
}

if (localStorage.getItem("watchTattico") === "true") {
  document.body.classList.add("red-mode");
}

function toggleModalita() {
  feedbackTattico();
  const isRed = document.body.classList.toggle("red-mode");
  localStorage.setItem("watchTattico", isRed);
}

function cambia(k, v) {
  feedbackTattico();
  cronologiaAzioni.push({ chiave: k, valorePrecedente: dati[k] });
  if (cronologiaAzioni.length > 15) cronologiaAzioni.shift();
  dati[k] = Math.max(0, dati[k] + v);
  localStorage.setItem("watchContatoreV1", JSON.stringify(dati));
  aggiornaSchermata();
}

function annulla() {
  if (cronologiaAzioni.length === 0) return;
  feedbackTattico();
  let ultima = cronologiaAzioni.pop();
  dati[ultima.chiave] = ultima.valorePrecedente;
  localStorage.setItem("watchContatoreV1", JSON.stringify(dati));
  aggiornaSchermata();
}

function generaReport(usaGrassetto = false) {
  let macro = [];
  const b = usaGrassetto ? "*" : "";
  
  let detPdc = [];
  if (dati.pdcItaNeg > 0) detPdc.push(`${b}${dati.pdcItaNeg}${b} ita neg`);
  if (dati.pdcItaPos > 0) detPdc.push(`${b}${dati.pdcItaPos}${b} ita pos`);
  if (dati.pdcStraPos > 0) detPdc.push(`${b}${dati.pdcStraPos}${b} stra pos`);
  if (dati.pdcStraNeg > 0) detPdc.push(`${b}${dati.pdcStraNeg}${b} stra neg`);
  
  if (detPdc.length > 0) macro.push(`${b}POSTO DI CONTROLLO:${b} ${b}${dati.pdcTg}${b} tg con ${detPdc.join(", ")}`);
  else if (dati.pdcTg > 0) macro.push(`${b}POSTO DI CONTROLLO:${b} ${b}${dati.pdcTg}${b} tg`);

  let detAp = [];
  if (dati.apItaNeg > 0) detAp.push(`${b}${dati.apItaNeg}${b} ita neg`);
  if (dati.apItaPos > 0) detAp.push(`${b}${dati.apItaPos}${b} ita pos`);
  if (dati.apStraPos > 0) detAp.push(`${b}${dati.apStraPos}${b} stra pos`);
  if (dati.apStraNeg > 0) detAp.push(`${b}${dati.apStraNeg}${b} stra neg`);
  if (detAp.length > 0) macro.push(detAp.join(", "));
  
  if (dati.tgSosta > 0) macro.push(`${b}${dati.tgSosta}${b} tg`);
  
  let detTr = [];
  if (dati.itaNeg > 0) detTr.push(`${b}${dati.itaNeg}${b} ita neg`);
  if (dati.itaPos > 0) detTr.push(`${b}${dati.itaPos}${b} ita pos`);
  if (dati.straPos > 0) detTr.push(`${b}${dati.straPos}${b} stra pos`);
  if (dati.straNeg > 0) detTr.push(`${b}${dati.straNeg}${b} stra neg`);
  
  if (detTr.length > 0) macro.push(`${b}${dati.tg}${b} tg con ${detTr.join(", ")}`);
  else if (dati.tg > 0) macro.push(`${b}${dati.tg}${b} tg`);

  return macro.length > 0 ? macro.join("\n\n") : "Nessun dato";
}

function aggiornaSchermata() {
  for (let k in dati) {
    let el = document.getElementById(`val-${k}`);
    if(el) el.innerText = dati[k];
  }
  document.getElementById("riepilogo").innerText = generaReport(false);
  document.getElementById("btn-undo").style.opacity = cronologiaAzioni.length > 0 ? "1" : "0.3";
}

function inviaWhatsApp() {
  feedbackTattico();
  window.location.href = "whatsapp://send?text=" + encodeURIComponent(generaReport(true));
}

function copiaTesto() {
  feedbackTattico();
  navigator.clipboard.writeText(generaReport(true)).then(() => {
    const btn = document.getElementById("btn-copia");
    btn.classList.add("success");
    setTimeout(() => { btn.classList.remove("success"); }, 1000);
  });
}

function azzera() {
  feedbackTattico();
  if (confirm("Azzera tutto?")) {
    for (let k in dati) dati[k] = 0;
    cronologiaAzioni = [];
    localStorage.setItem("watchContatoreV1", JSON.stringify(dati));
    aggiornaSchermata();
  }
}
aggiornaSchermata();
</script>
</body>
</html>
