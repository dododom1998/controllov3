<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Contatore Posto di Controllo - v1 iPhone 44px</title>
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --border-card: #334155;
    --text-title: #94a3b8;
    --pos-highlight: #7f1d1d;
    --pos-border: #991b1b;
    --pos-text: #fca5a5;
  }

  body.dark-eclipse {
    --bg-main: #000000;
    --bg-card: #111111;
    --border-card: #222222;
    --text-title: #666666;
    --pos-highlight: #450a0a;
    --pos-border: #7f1d1d;
    --pos-text: #fca5a5;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-main); 
    color: #f8fafc;
    text-align: center;
    padding: 6px 12px calc(10px + env(safe-area-inset-bottom));
    margin: 0;
    height: 100vh;
    height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.3s ease;
    overflow: hidden;
  }
  
  html {
    height: -webkit-fill-available;
  }

  /* HEADER */
  .header-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 28px;
    margin-bottom: 4px;
    flex-shrink: 0;
  }
  h2 { 
    margin: 0; 
    font-size: 14px; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
    color: var(--text-title);
  }
  .btn-mode {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    color: #e2e8f0;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  /* BLOCCO TARGHE (Altezza adattata per i tasti da 44px) */
  .top-tg-block {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-sizing: border-box;
    border: 1px solid var(--border-card);
    height: 106px; 
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  .tg-side-btns {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 28%;
  }
  .tg-center-display {
    width: 42%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }
  .tg-label-num {
    font-size: 13px;
    color: #cbd5e1;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tg-label-num span {
    font-size: 24px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
  }

  /* TASTI TARGA PORTATI A 44PX */
  .btn-tg-v {
    height: 44px !important; 
    min-height: 44px !important;
    font-size: 15px !important;
    border-radius: 8px;
    font-weight: bold;
    text-transform: uppercase;
  }

  /* GRIGLIA CENTRALE CONTATORI */
  .flex-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-grow: 1;
    margin-bottom: 6px;
  }
  .flex-row {
    display: flex;
    gap: 6px;
    flex: 1;
  }
  
  /* CARD */
  .card {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 6px 8px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    border: 1px solid var(--border-card);
  }
  
  .card.pos-highlight {
    background: var(--pos-highlight); 
    border: 1px solid var(--pos-border);
  }
  
  .card h3 { 
    margin: 2px 0 0 0; 
    font-size: 13px; 
    color: var(--text-title); 
    text-transform: uppercase;
    font-weight: 700;
  }
  
  .card.pos-highlight h3 {
    color: var(--pos-text);
  }
  
  .num { 
    font-size: 36px; 
    font-weight: 800; 
    margin: auto 0; 
    line-height: 1; 
    color: #fff; 
  }
  
  .btn-container {
    display: flex;
    gap: 6px;
    width: 100%;
  }
  
  button {
    border: 0;
    font-weight: bold;
    touch-action: manipulation;
    cursor: pointer;
    transition: transform 0.05s ease;
  }
  button:active {
    transform: scale(0.95);
  }
  
  /* TASTI DEI 4 QUADRANTI PORTATI A 44PX */
  .card button {
    font-size: 16px !important;   
    height: 44px !important;      
    min-height: 44px !important;
    border-radius: 6px;
  }
  
  .plus { background: #059669; color: white; flex: 1.8; } 
  .plus-sosta { background: #2563eb; color: white; flex: 1.8; } 
  .minus { background: #dc2626; color: white; flex: 1; }
