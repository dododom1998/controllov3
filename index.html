<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Contatore Posto di Controllo - V1 Avanzata</title>
<style>
  /* BASE DI PARTENZA NATIVA: TOTAL BLACK */
  :root {
    --bg-main: #000000;
    --bg-card: #111111;
    --border-card: #222222;
    --text-title: #666666;
    --pos-highlight: #450a0a;
    --pos-border: #7f1d1d;
    --pos-text: #fca5a5;
  }

  /* MODALITÀ BLU NOTTE OPZIONALE */
  body.blue-mode {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --border-card: #334155;
    --text-title: #94a3b8;
    --pos-highlight: #7f1d1d;
    --pos-border: #991b1b;
    --pos-text: #fca5a5;
  }

  html {
    background-color: #000000; 
    height: -webkit-fill-available;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-main); 
    color: #f8fafc;
    text-align: center;
    padding: 4px 10px calc(8px + env(safe-area-inset-bottom));
    margin: 0;
    height: 100vh;
    height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.2s ease;
    overflow: hidden;
  }

  /* HEADER COMPATTATO */
  .header-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 24px;
    margin-bottom: 2px;
    flex-shrink: 0;
  }
  h2 { 
    margin: 0; 
    font-size: 13px; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
    color: var(--text-title);
  }
  .btn-mode {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    color: #e2e8f0;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  /* BLOCCO TARGHE (Transito standard) */
  .top-tg-block {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 4px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-sizing: border-box;
    border: 1px solid var(--border-card);
    height: 112px; 
    margin-bottom: 4px;
    flex-shrink: 0;
  }
  .tg-side-btns {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 28%;
  }
  .tg-center-display {
    width: 42%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .tg-label-num {
    font-size: 12px;
    color: #cbd5e1;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tg-label-num span {
    font-size: 22px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
  }

  .btn-tg-v {
    height: 48px !important; 
    min-height: 48px !important;
    font-size: 15px !important;
    border-radius: 8px;
    font-weight: bold;
    text-transform: uppercase;
  }

  /* GRIGLIA CENTRALE CONTATORI */
  .flex-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-grow: 1;
    margin-bottom: 4px;
  }
  .flex-row {
    display: flex;
    gap: 4px;
    flex: 1;
  }
  
  /* CARD */
  .card {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 4px 6px; 
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    border: 1px solid var(--border-card);
  }
  
  .card.pos-highlight {
    background: var(--pos-highlight); 
    border: 1px solid var(--pos-border);
  }
  
  .card h3 { 
    margin: 1px 0 0 0; 
    font-size: 12px; 
    color: var(--text-title); 
    text-transform: uppercase;
    font-weight: 700;
  }
  
  .card.pos-highlight h3 {
    color: var(--pos-text);
  }
  
  .num { 
    font-size: 32px; 
    font-weight: 800; 
    margin: auto 0; 
    line-height: 1; 
    color: #fff; 
  }
  
  .btn-container {
    display: flex;
    gap: 4px;
    width: 100%;
  }
  
  button {
    border: 0;
    font-weight: bold;
    touch-action: manipulation;
    cursor: pointer;
    transition: transform 0.05s ease;
  }
  button:active {
    transform: scale(0.95);
  }
  
  /* TASTI DEI CONTATORI A 48PX */
  .card button {
    font-size: 16px !important;   
    height: 48px !important;      
    min-height: 48px !important;
    border-radius: 6px;
  }
  
  .plus { background: #059669; color: white; flex: 1.8; } 
  .plus-sosta { background: #2563eb; color: white; flex: 1.8; } 
  .minus { background: #dc2626; color: white; flex: 1; } 

  /* TASTI CENTRALI DI APERTURA PANNELLI (48PX) */
  .btn-trigger-panel {
    color: white;
    width: 100%;
    height: 48px;
    min-height: 48px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 10px;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn-pdc { background: #7c3aed; border: 1px solid #8b5cf6; } /* Viola Tattico */
  .btn-appiedati { background: #1d4ed8; border: 1px solid #2563eb; } /* Blu Classico */

  /* FOOTER */
  .footer {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  
  .summary { 
    font-size: 12px; 
    background: #050505; 
    padding: 6px 10px; 
    border-radius: 8px; 
    text-align: left; 
    white-space: pre-line; 
    border: 1px solid #111111;
    color: #0ea5e9; 
    font-family: monospace;
    height: auto; 
    min-height: 34px; 
    box-sizing: border-box;
    display: flex;
    align-items: center;
  }
  body.blue-mode .summary {
    background: #020617;
    border-color: #1e293b;
    color: #38bdf8;
  }
  
  .action-btns { 
    display: flex; 
    gap: 4px; 
    height: 48px; 
    min-height: 48px;
  }
  .whatsapp { background: #16a34a; color: white; flex: 1.4; font-size: 15px; border-radius: 8px; height: 100%; }
  .undo { background: #4b5563; color: white; flex: 0.8; font-size: 18px; border-radius: 8px; height: 100%; }
  .reset { background: #b45309; color: white; flex: 0.8; font-size: 18px; border-radius: 8px; height: 100%; }

  /* POPUP SCHERMATE APPIEDATI E POSTO DI CONTROLLO */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 15px;
    box-sizing: border-box;
  }
  .modal-content {
    background: var(--bg-main);
    width: 100%;
    max-width: 400px;
    border-radius: 16px;
    padding: 15px;
    border: 2px solid var(--border-card);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn-chiudi-modal {
    background: #0f766e;
    color: white;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 10px;
    text-transform: uppercase;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<div class="header-area">
  <h2>Posto di Controllo V1</h2>
  <button class="btn-mode" id="mode-icon" onclick="toggleModalita()">🔵</button>
</div>

<div class="top-tg-block">
  <div class="tg-side-btns">
    <button class="plus-sosta btn-tg-v" onclick="cambia('tgSosta',1)">+1 S</button>
    <button class="minus btn-tg-v" onclick="cambia('tgSosta',-1)">-1 S</button>
  </div>
  <div class="tg-center-display">
    <div class="tg-label-num">Sosta: <span id="val-tgSosta">0</span></div>
    <div class="tg-label-num">Occupanti: <span id="val-tg">0</span></div>
  </div>
  <div class="tg-side-btns">
    <button class="plus btn-tg-v" onclick="cambia('tg',1)">+1 O</button>
    <button class="minus btn-tg-v" onclick="cambia('tg',-1)">-1 O</button>
  </div>
</div>

<div class="flex-grid">
  <div class="flex-row">
    <div class="card pos-highlight">
      <h3>Ita Pos</h3>
      <div class="num" id="val-itaPos">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('itaPos',-1)">-1</button>
        <button class="plus" onclick="cambia('itaPos',1)">+1</button>
      </div>
    </div>
    <div class="card">
      <h3>Ita Neg</h3>
      <div class="num" id="val-itaNeg">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('itaNeg',-1)">-1</button>
        <button class="plus" onclick="cambia('itaNeg',1)">+1</button>
      </div>
    </div>
  </div>
  
  <div class="flex-row">
    <div class="card pos-highlight">
      <h3>Stra Pos</h3>
      <div class="num" id="val-straPos">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('straPos',-1)">-1</button>
        <button class="plus" onclick="cambia('straPos',1)">+1</button>
      </div>
    </div>
    <div class="card">
      <h3>Stra Neg</h3>
      <div class="num" id="val-straNeg">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('straNeg',-1)">-1</button>
        <button class="plus" onclick="cambia('straNeg',1)">+1</button>
      </div>
    </div>
  </div>
</div>

<button class="btn-trigger-panel btn-pdc" onclick="apriModal('modalPdc')">🚨 Posto di Controllo</button>
<button class="btn-trigger-panel btn-appiedati" onclick="apriModal('modalAppiedati')">🚶 Appiedati</button>

<div class="footer">
  <div class="summary" id="riepilogo">Nessun controllo effettuato</div>
  <div class="action-btns">
    <button class="whatsapp" onclick="inviaWhatsApp()">💬 Invia</button>
    <button class="undo" id="btn-undo" onclick="annulla()" style="opacity: 0.3;">↩︎</button>
    <button class="reset" onclick="azzera()">🗑️</button>
  </div>
</div>

<div class="modal-overlay" id="modalPdc">
  <div class="modal-content">
    <h2 style="color:#a78bfa; margin:2px 0 6px 0; font-size:15px;">🚨 Attività Posto di Controllo</h2>
    
    <div class="top-tg-block" style="margin-bottom: 4px;">
      <div class="tg-side-btns">
        <button class="plus-sosta btn-tg-v" onclick="cambia('pdcTgSosta',1)">+1 S</button>
        <button class="minus btn-tg-v" onclick="cambia('pdcTgSosta',-1)">-1 S</button>
      </div>
      <div class="tg-center-display">
        <div class="tg-label-num">Sosta: <span id="val-pdcTgSosta">0</span></div>
        <div class="tg-label-num">Occupanti: <span id="val-pdcTg">0</span></div>
      </div>
      <div class="tg-side-btns">
        <button class="plus btn-tg-v" onclick="cambia('pdcTg',1)">+1 O</button>
        <button class="minus btn-tg-v" onclick="cambia('pdcTg',-1)">-1 O</button>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 6px; flex-grow: 1; margin-bottom:6px;">
      <div class="flex-row">
        <div class="card pos-highlight">
          <h3>Ita Pos</h3>
          <div class="num" id="val-pdcItaPos">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('pdcItaPos',-1)">-1</button>
            <button class="plus" onclick="cambia('pdcItaPos',1)">+1</button>
          </div>
        </div>
        <div class="card">
          <h3>Ita Neg</h3>
          <div class="num" id="val-pdcItaNeg">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('pdcItaNeg',-1)">-1</button>
            <button class="plus" onclick="cambia('pdcItaNeg',1)">+1</button>
          </div>
        </div>
      </div>
      <div class="flex-row">
        <div class="card pos-highlight">
          <h3>Stra Pos</h3>
          <div class="num" id="val-pdcStraPos">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('pdcStraPos',-1)">-1</button>
            <button class="plus" onclick="cambia('pdcStraPos',1)">+1</button>
          </div>
        </div>
        <div class="card">
          <h3>Stra Neg</h3>
          <div class="num" id="val-pdcStraNeg">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('pdcStraNeg',-1)">-1</button>
            <button class="plus" onclick="cambia('pdcStraNeg',1)">+1</button>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-chiudi-modal" onclick="chiudiModal('modalPdc')">Fatto</button>
  </div>
</div>

<div class="modal-overlay" id="modalAppiedati">
  <div class="modal-content">
    <h2 style="color:#38bdf8; margin:4px 0 6px 0; font-size:15px;">Controlli Appiedati</h2>
    <div style="display: flex; flex-direction: column; gap: 6px; flex-grow: 1; margin-bottom:8px;">
      <div class="flex-row">
        <div class="card pos-highlight">
          <h3>Ita Pos</h3>
          <div class="num" id="val-apItaPos">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('apItaPos',-1)">-1</button>
            <button class="plus" onclick="cambia('apItaPos',1)">+1</button>
          </div>
        </div>
        <div class="card">
          <h3>Ita Neg</h3>
          <div class="num" id="val-apItaNeg">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('apItaNeg',-1)">-1</button>
            <button class="plus" onclick="cambia('apItaNeg',1)">+1</button>
          </div>
        </div>
      </div>
      <div class="flex-row">
        <div class="card pos-highlight">
          <h3>Stra Pos</h3>
          <div class="num" id="val-apStraPos">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('apStraPos',-1)">-1</button>
            <button class="plus" onclick="cambia('apStraPos',1)">+1</button>
          </div>
        </div>
        <div class="card">
          <h3>Stra Neg</h3>
          <div class="num" id="val-apStraNeg">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('apStraNeg',-1)">-1</button>
            <button class="plus" onclick="cambia('apStraNeg',1)">+1</button>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-chiudi-modal" onclick="chiudiModal('modalAppiedati')">Fatto</button>
  </div>
</div>

<script>
let datiSalvati = JSON.parse(localStorage.getItem("contatoreV1")) || {};
let dati = {
  // Transito normale
  tgSosta: Number(datiSalvati.tgSosta) || 0,
  tg: Number(datiSalvati.tg) || 0,
  itaNeg: Number(datiSalvati.itaNeg) || 0,
  itaPos: Number(datiSalvati.itaPos) || 0,
  straPos: Number(datiSalvati.straPos) || 0,
  straNeg: Number(datiSalvati.straNeg) || 0,
  // Appiedati
  apItaNeg: Number(datiSalvati.apItaNeg) || 0,
  apItaPos: Number(datiSalvati.apItaPos) || 0,
  apStraPos: Number(datiSalvati.apStraPos) || 0,
  apStraNeg: Number(datiSalvati.apStraNeg) || 0,
  // Posto di Controllo dedicato
  pdcTgSosta: Number(datiSalvati.pdcTgSosta) || 0,
  pdcTg: Number(datiSalvati.pdcTg) || 0,
  pdcItaNeg: Number(datiSalvati.pdcItaNeg) || 0,
  pdcItaPos: Number(datiSalvati.pdcItaPos) || 0,
  pdcStraPos: Number(datiSalvati.pdcStraPos) || 0,
  pdcStraNeg: Number(datiSalvati.pdcStraNeg) || 0
};

let cronologiaAzioni = [];

function feedbackTattico() {
  if (navigator.vibrate) navigator.vibrate(15);
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(550, ctx.currentTime);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.03);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.03);
  } catch (e) {}
}

function toggleModalita() {
  feedbackTattico();
  const isBlue = document.body.classList.toggle("blue-mode");
  document.getElementById("mode-icon").innerText = isBlue ? "⬛" : "🔵";
}

function salva() {
  localStorage.setItem("contatoreV1", JSON.stringify(dati));
}

function cambia(k, v, sbloccaUndo = true) {
  feedbackTattico();
  if (sbloccaUndo) {
    cronologiaAzioni.push({ chiave: k, valorePrecedente: dati[k] });
    if (cronologiaAzioni.length > 20) cronologiaAzioni.shift();
  }
  dati[k] = Math.max(0, dati[k] + v);
  salva(); 
  aggiornaSchermata();
}

function annulla() {
  if (cronologiaAzioni.length === 0) return;
  feedbackTattico();
  let ultimaAzione = cronologiaAzioni.pop();
  dati[ultimaAzione.chiave] = ultimaAzione.valorePrecedente;
  salva();
  aggiornaSchermata();
}

function apriModal(id) { feedbackTattico(); document.getElementById(id).style.display = "flex"; }
function chiudiModal(id) { feedbackTattico(); document.getElementById(id).style.display = "none"; }

function testo() {
  let righe = [];
  
  // 1. BLOCCO APPIEDATI
  let detAp = []; 
  if (dati.apItaNeg > 0) detAp.push(`${dati.apItaNeg} ita neg`);
  if (dati.apItaPos > 0) detAp.push(`${dati.apItaPos} ita pos`);
  if (dati.apStraPos > 0) detAp.push(`${dati.apStraPos} stra pos`);
  if (dati.apStraNeg > 0) detAp.push(`${dati.apStraNeg} stra neg`);
  if (detAp.length > 0) righe.push(`Appiedati: ${detAp.join(", ")}`);
  
  // 2. BLOCCO POSTO DI CONTROLLO (ISOLATO)
  let righePdc = [];
  if (dati.pdcTgSosta > 0) righePdc.push(`${dati.pdcTgSosta} tg`);
  
  let detPdcPersone = [];
  if (dati.pdcItaNeg > 0) detPdcPersone.push(`${dati.pdcItaNeg} ita neg`);
  if (dati.pdcItaPos > 0) detPdcPersone.push(`${dati.pdcItaPos} ita pos`);
  if (dati.pdcStraPos > 0) detPdcPersone.push(`${dati.pdcStraPos} stra pos`);
  if (dati.pdcStraNeg > 0) detPdcPersone.push(`${dati.pdcStraNeg} stra neg`);
  
  if (dati.pdcTg > 0) {
    let stringaTg = `${dati.pdcTg} tg`;
    if (detPdcPersone.length > 0) stringaTg += ` con ${detPdcPersone.join(", ")}`;
    righePdc.push(stringaTg);
  } else if (detPdcPersone.length > 0) {
    righePdc.push(detPdcPersone.join(", "));
  }
  
  if (righePdc.length > 0) {
    righe.push(`Posto di controllo: ${righePdc.join(", ")}`);
  }

  // 3. BLOCCO AUTO IN TRANSITO STANDARD
  if (dati.tgSosta > 0) righe.push(`${dati.tgSosta} tg`);
  
  let detTransitoPersone = [];
  if (dati.itaNeg > 0) detTransitoPersone.push(`${dati.itaNeg} ita neg`);
  if (dati.itaPos > 0) detTransitoPersone.push(`${dati.itaPos} ita pos`);
  if (dati.straPos > 0) detTransitoPersone.push(`${dati.straPos} stra pos`);
  if (dati.straNeg > 0) detTransitoPersone.push(`${dati.straNeg} stra neg`);
  
  if (dati.tg > 0) {
    let stringaTgTransito = `${dati.tg} tg`;
    if (detTransitoPersone.length > 0) stringaTgTransito += ` con ${detTransitoPersone.join(", ")}`;
    righe.push(stringaTgTransito);
  } else if (detTransitoPersone.length > 0) {
    righe.push(detTransitoPersone.join(", "));
  }

  return righe.length > 0 ? righe.join("\n") : "Nessun controllo effettuato";
}

function aggiornaSchermata() {
  for (let k in dati) {
    let el = document.getElementById(`val-${k}`);
    if(el) el.innerText = dati[k];
  }
  document.getElementById("riepilogo").innerText = testo();
  
  let btnUndo = document.getElementById("btn-undo");
  btnUndo.style.opacity = cronologiaAzioni.length > 0 ? "1" : "0.3";
}

function inviaWhatsApp() {
  feedbackTattico();
  const t = testo();
  window.location.href = "whatsapp://send?text=" + encodeURIComponent(t);
}

function azzera() {
  feedbackTattico();
  if (confirm("Ripristinare tutti i contatori a zero?")) {
    for (let k in dati) dati[k] = 0;
    cronologiaAzioni = []; 
    salva(); 
    aggiornaSchermata();
  }
}
aggiornaSchermata();
</script>
</body>
</html>
