<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Contatore Posto di Controllo - v1 iOS Perfect Fit</title>
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --border-card: #334155;
    --text-title: #94a3b8;
    --pos-highlight: #7f1d1d;
    --pos-border: #991b1b;
    --pos-text: #fca5a5;
  }

  body.dark-eclipse {
    --bg-main: #000000;
    --bg-card: #111111;
    --border-card: #222222;
    --text-title: #666666;
    --pos-highlight: #450a0a;
    --pos-border: #7f1d1d;
    --pos-text: #fca5a5;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-main); 
    color: #f8fafc;
    text-align: center;
    padding: 6px 10px calc(6px + env(safe-area-inset-bottom));
    margin: 0;
    min-height: -webkit-fill-available;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.3s ease;
    overflow: hidden; 
  }
  
  html {
    height: -webkit-fill-available;
  }

  .header-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 30px;
    margin-bottom: 2px;
  }
  h2 { 
    margin: 0; 
    font-size: 14px; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
    color: var(--text-title);
  }
  .btn-mode {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    color: #e2e8f0;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  /* BLOCCO TARGHE COMPATTO */
  .top-tg-block {
    background: var(--bg-card);
    border-radius: 10px;
    padding: 4px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 76px;
    box-sizing: border-box;
    border: 1px solid var(--border-card);
    margin-bottom: 4px;
  }
  .tg-side-btns {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 28%;
  }
  .tg-center-display {
    width: 42%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .tg-label-num {
    font-size: 11px;
    color: #cbd5e1;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tg-label-num span {
    font-size: 20px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
  }

  .btn-tg-v {
    height: 32px !important; 
    min-height: 32px !important;
    font-size: 13px !important;
    border-radius: 6px;
    font-weight: bold;
  }

  /* GRIGLIA CENTRALE BLOCCATA NELL'ALTEZZA */
  .flex-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-grow: 1;
    max-height: calc(100vh - 250px); /* Impedisce ai quadranti di allungarsi all'infinito */
  }
  .flex-row {
    display: flex;
    gap: 4px;
    flex: 1;
  }
  
  .card {
    background: var(--bg-card);
    border-radius: 10px;
    padding: 4px 6px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    border: 1px solid var(--border-card);
  }
  
  .card.pos-highlight {
    background: var(--pos-highlight); 
    border: 1px solid var(--pos-border);
  }
  
  .card h3 { 
    margin: 0; 
    font-size: 11px; 
    color: var(--text-title); 
    text-transform: uppercase;
    font-weight: 700;
  }
  
  .card.pos-highlight h3 {
    color: var(--pos-text);
  }
  
  .num { 
    font-size: 28px; 
    font-weight: 800; 
    margin: 1px 0; 
    line-height: 1; 
    color: #fff; 
  }
  
  .btn-container {
    display: flex;
    gap: 4px;
    width: 100%;
  }
  
  button {
    border: 0;
    font-weight: bold;
    touch-action: manipulation;
    cursor: pointer;
    transition: transform 0.05s ease;
  }
  button:active {
    transform: scale(0.95);
  }
  
  .card button {
    font-size: 14px !important;   
    height: 30px !important;      
    min-height: 30px !important;
    border-radius: 5px;
  }
  
  .plus { background: #059669; color: white; flex: 1.8; } 
  .plus-sosta { background: #2563eb; color: white; flex: 1.8; } 
  .minus { background: #dc2626; color: white; flex: 1; } 

  /* TASTO APPIEDATI */
  .btn-appiedati {
    background: #1d4ed8;
    color: white;
    width: 100%;
    height: 34px;
    font-size: 13px;
    font-weight: bold;
    border-radius: 8px;
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 4px;
    border: 1px solid #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  /* REPARTO FOOTER COMANDI */
  .footer {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  
  .summary { 
    font-size: 11px; 
    background: #020617; 
    padding: 6px 10px; 
    border-radius: 8px; 
    text-align: left; 
    white-space: pre-line; 
    border: 1px solid #1e293b;
    color: #38bdf8; 
    font-family: monospace;
    height: 30px;
    min-height: 30px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
  }
  body.dark-eclipse .summary {
    background: #050505;
    border-color: #111;
    color: #0ea5e9;
  }
  
  .action-btns { 
    display: flex; 
    gap: 4px; 
    height: 38px;
  }
  .copy { background: #0f766e; color: white; flex: 2; font-size: 12px; border-radius: 6px; text-transform: uppercase; }
  .whatsapp { background: #16a34a; color: white; flex: 2; font-size: 12px; border-radius: 6px; text-transform: uppercase; }
  .undo { background: #4b5563; color: white; flex: 1; font-size: 15px; border-radius: 6px; }
  .reset { background: #b45309; color: white; flex: 1; font-size: 14px; border-radius: 6px; }

  /* POPUP MODAL APPIEDATI */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 15px;
    box-sizing: border-box;
  }
  .modal-content {
    background: var(--bg-main);
    width: 100%;
    max-width: 400px;
    border-radius: 16px;
    padding: 15px;
    border: 2px solid var(--border-card);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn-chiudi-modal {
    background: #0f766e;
    color: white;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 10px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="header-area">
  <h2>Posto di Controllo v1</h2>
  <button class="btn-mode" onclick="toggleNotturna()">🌙</button>
</div>

<div class="top-tg-block">
  <div class="tg-side-btns">
    <button class="plus-sosta btn-tg-v" onclick="cambia('tgSosta',1)">+1 S</button>
    <button class="minus btn-tg-v" onclick="cambia('tgSosta',-1)">-1 S</button>
  </div>
  <div class="tg-center-display">
    <div class="tg-label-num">Sosta: <span id="val-tgSosta">0</span></div>
    <div class="tg-label-num">Occupanti: <span id="val-tg">0</span></div>
  </div>
  <div class="tg-side-btns">
    <button class="plus btn-tg-v" onclick="cambia('tg',1)">+1 O</button>
    <button class="minus btn-tg-v" onclick="cambia('tg',-1)">-1 O</button>
  </div>
</div>

<div class="flex-grid">
  <div class="flex-row">
    <div class="card pos-highlight">
      <h3>Ita Pos</h3>
      <div class="num" id="val-itaPos">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('itaPos',-1)">-1</button>
        <button class="plus" onclick="cambia('itaPos',1)">+1</button>
      </div>
    </div>
    <div class="card">
      <h3>Ita Neg</h3>
      <div class="num" id="val-itaNeg">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('itaNeg',-1)">-1</button>
        <button class="plus" onclick="cambia('itaNeg',1)">+1</button>
      </div>
    </div>
  </div>
  
  <div class="flex-row">
    <div class="card pos-highlight">
      <h3>Stra Pos</h3>
      <div class="num" id="val-straPos">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('straPos',-1)">-1</button>
        <button class="plus" onclick="cambia('straPos',1)">+1</button>
      </div>
    </div>
    <div class="card">
      <h3>Stra Neg</h3>
      <div class="num" id="val-straNeg">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('straNeg',-1)">-1</button>
        <button class="plus" onclick="cambia('straNeg',1)">+1</button>
      </div>
    </div>
  </div>
</div>

<button class="btn-appiedati" onclick="apriModal()">🚶 Appiedati</button>

<div class="footer">
  <div class="summary" id="riepilogo">Nessun controllo effettuato</div>
  <div class="action-btns">
    <button class="copy" onclick="copia()">Copia</button>
    <button class="whatsapp" onclick="inviaWhatsApp()">Invia 💬</button>
    <button class="undo" id="btn-undo" onclick="annulla()" style="opacity: 0.3;">↩︎</button>
    <button class="reset" onclick="azzera()">🗑️</button>
  </div>
</div>

<div class="modal-overlay" id="modalAppiedati">
  <div class="modal-content">
    <h2 style="color:#38bdf8; margin:4px 0 8px 0; font-size:15px;">Controlli Appiedati</h2>
    <div style="display: flex; flex-direction: column; gap: 6px; flex-grow: 1; margin-bottom:8px;">
      <div class="flex-row">
        <div class="card pos-highlight">
          <h3>Ita Pos</h3>
          <div class="num" id="val-apItaPos">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('apItaPos',-1)">-1</button>
            <button class="plus" onclick="cambia('apItaPos',1)">+1</button>
          </div>
        </div>
        <div class="card">
          <h3>Ita Neg</h3>
          <div class="num" id="val-apItaNeg">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('apItaNeg',-1)">-1</button>
            <button class="plus" onclick="cambia('apItaNeg',1)">+1</button>
          </div>
        </div>
      </div>
      <div class="flex-row">
        <div class="card pos-highlight">
          <h3>Stra Pos</h3>
          <div class="num" id="val-apStraPos">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('apStraPos',-1)">-1</button>
            <button class="plus" onclick="cambia('apStraPos',1)">+1</button>
          </div>
        </div>
        <div class="card">
          <h3>Stra Neg</h3>
          <div class="num" id="val-apStraNeg">0</div>
          <div class="btn-container">
            <button class="minus" onclick="cambia('apStraNeg',-1)">-1</button>
            <button class="plus" onclick="cambia('apStraNeg',1)">+1</button>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-chiudi-modal" onclick="chiudiModal()">Fatto</button>
  </div>
</div>

<script>
let datiSalvati = JSON.parse(localStorage.getItem("contatore")) || {};
let dati = {
  tgSosta: Number(datiSalvati.tgSosta) || 0,
  tg: Number(datiSalvati.tg) || 0,
  itaNeg: Number(datiSalvati.itaNeg) || 0,
  itaPos: Number(datiSalvati.itaPos) || 0,
  straPos: Number(datiSalvati.straPos) || 0,
  straNeg: Number(datiSalvati.straNeg) || 0,
  apItaNeg: Number(datiSalvati.apItaNeg) || 0,
  apItaPos: Number(datiSalvati.apItaPos) || 0,
  apStraPos: Number(datiSalvati.apStraPos) || 0,
  apStraNeg: Number(datiSalvati.apStraNeg) || 0
};

let cronologiaAzioni = [];

function feedbackTattico() {
  if (navigator.vibrate) navigator.vibrate(15);
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(550, ctx.currentTime);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.03);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.03);
  } catch (e) {}
}

function toggleNotturna() {
  feedbackTattico();
  document.body.classList.toggle("dark-eclipse");
}

function salva() {
  localStorage.setItem("contatore", JSON.stringify(dati));
}

function cambia(k, v, sbloccaUndo = true) {
  feedbackTattico();
  if (sbloccaUndo) {
    cronologiaAzioni.push({ chiave: k, valorePrecedente: dati[k] });
    if (cronologiaAzioni.length > 20) cronologiaAzioni.shift();
  }
  dati[k] = Math.max(0, dati[k] + v);
  salva(); 
  aggiornaSchermata();
}

function annulla() {
  if (cronologiaAzioni.length === 0) return;
  feedbackTattico();
  let ultimaAzione = cronologiaAzioni.pop();
  dati[ultimaAzione.chiave] = ultimaAzione.valorePrecedente;
  salva();
  aggiornaSchermata();
}

function apriModal() { feedbackTattico(); document.getElementById("modalAppiedati").style.display = "flex"; }
function chiudiModal() { feedbackTattico(); document.getElementById("modalAppiedati").style.display = "none"; }

function testo() {
  let righe = [];
  let dettagliPedoni = [];
  if (dati.apItaNeg > 0) dettagliPedoni.push(`${dati.apItaNeg} ita neg`);
  if (dati.apItaPos > 0) dettagliPedoni.push(`${dati.apItaPos} ita pos`);
  if (dati.apStraPos > 0) dettagliPedoni.push(`${dati.apStraPos} stra pos`);
  if (dati.apStraNeg > 0) dettagliPedoni.push(`${dati.apStraNeg} stra neg`);
  
  if (dettagliPedoni.length > 0) righe.push(`Appiedati: ${dettagliPedoni.join(", ")}`);
  if (dati.tgSosta > 0) righe.push(`${dati.tgSosta} tg`);
  
  let dettagliPersone = [];
  if (dati.itaNeg > 0) dettagliPersone.push(`${dati.itaNeg} ita neg`);
  if (dati.itaPos > 0) dettagliPersone.push(`${dati.itaPos} ita pos`);
  if (dati.straPos > 0) dettagliPersone.push(`${dati.straPos} stra pos`);
  if (dati.straNeg > 0) dettagliPersone.push(`${dati.straNeg} stra neg`);
  
  if (dati.tg > 0) {
    let rigaTgCon = `${dati.tg} tg`;
    if (dettagliPersone.length > 0) rigaTgCon += ` con ${dettagliPersone.join(", ")}`;
    righe.push(rigaTgCon);
  } else if (dettagliPersone.length > 0) {
    righe.push(dettagliPersone.join(", "));
  }
  return righe.length > 0 ? righe.join("\n") : "Nessun controllo effettuato";
}

function aggiornaSchermata() {
  for (let k in dati) {
    let el = document.getElementById(`val-${k}`);
    if(el) el.innerText = dati[k];
  }
  document.getElementById("riepilogo").innerText = testo();
  
  let btnUndo = document.getElementById("btn-undo");
  btnUndo.style.opacity = cronologiaAzioni.length > 0 ? "1" : "0.3";
}

function copia() {
  feedbackTattico();
  const t = testo();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(t).then(() => alert("Copiato negli appunti!")).catch(() => fallbackCopia(t));
  } else { fallbackCopia(t); }
}

function fallbackCopia(text) {
  const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); alert("Copiato negli appunti!"); } catch (err) { alert("Errore copia."); }
  document.body.removeChild(ta);
}

function inviaWhatsApp() {
  feedbackTattico();
  const t = testo();
  window.location.href = "whatsapp://send?text=" + encodeURIComponent(t);
}

function azzera() {
  feedbackTattico();
  if (confirm("Ripristinare tutti i contatori della v1 a zero?")) {
    for (let k in dati) dati[k] = 0;
    cronologiaAzioni = []; 
    salva(); 
    aggiornaSchermata();
  }
}
aggiornaSchermata();
</script>
</body>
</html>
