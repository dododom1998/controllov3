<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Contatore Posto di Controllo - v1 Perfect Fit</title>
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --border-card: #334155;
    --text-title: #94a3b8;
    --pos-highlight: #7f1d1d;
    --pos-border: #991b1b;
    --pos-text: #fca5a5;
  }

  body.dark-eclipse {
    --bg-main: #000000;
    --bg-card: #111111;
    --border-card: #222222;
    --text-title: #666666;
    --pos-highlight: #450a0a;
    --pos-border: #7f1d1d;
    --pos-text: #fca5a5;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-main); 
    color: #f8fafc;
    text-align: center;
    padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    margin: 0;
    height: 100vh;
    height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.3s ease;
    overflow: hidden; /* Blocca tassativamente ogni tipo di scroll su iPhone */
  }
  
  html {
    height: -webkit-fill-available;
  }

  .header-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 32px;
    margin-bottom: 4px;
  }
  h2 { 
    margin: 0; 
    font-size: 15px; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
    color: var(--text-title);
  }
  .btn-mode {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    color: #e2e8f0;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  /* BLOCCO TARGHE - GRANDEZZA ORIGINALE V1 */
  .top-tg-block {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-sizing: border-box;
    border: 1px solid var(--border-card);
    height: 72px;
    margin-bottom: 6px;
  }
  .tg-side-btns {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 28%;
  }
  .tg-center-display {
    width: 42%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .tg-label-num {
    font-size: 12px;
    color: #cbd5e1;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tg-label-num span {
    font-size: 22px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
  }

  .btn-tg-v {
    height: 30px !important; 
    min-height: 30px !important;
    font-size: 13px !important;
    border-radius: 6px;
    font-weight: bold;
  }

  /* GRIGLIA CONTATORI FLESSIBILE - SI ADATTA ALL'IPHONE SENZA SBORDARE */
  .flex-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1; 
    min-height: 0; /* Permette la compressione fluida se lo schermo è corto */
    margin-bottom: 6px;
  }
  .flex-row {
    display: flex;
    gap: 6px;
    flex: 1;
    min-height: 0;
  }
  
  /* CARD ORIGINALE V1 CON GRANDI DIMENSIONI SE C'E' SPAZIO */
  .card {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 6px 8px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    border: 1px solid var(--border-card);
    min-height: 0;
  }
  
  .card.pos-highlight {
    background: var(--pos-highlight); 
    border: 1px solid var(--pos-border);
  }
  
  .card h3 { 
    margin: 2px 0 0 0; 
    font-size: 13px; 
    color: var(--text-title); 
    text-transform: uppercase;
    font-weight: 700;
  }
  
  .card.pos-highlight h3 {
    color: var(--pos-text);
  }
  
  .num { 
    font-size: 36px; /* Grandezza originale V1 */
    font-weight: 800; 
    margin: auto 0; 
    line-height: 1; 
    color: #fff; 
  }
  
  .btn-container {
    display: flex;
    gap: 6px;
    width: 100%;
  }
  
  button {
    border: 0;
    font-weight: bold;
    touch-action: manipulation;
    cursor: pointer;
    transition: transform 0.05s ease;
  }
  button:active {
    transform: scale(0.95);
  }
  
  /* PULSANTI GRANDI E COMODI COME LA V1 */
  .card button {
    font-size: 16px !important;   
    height: 40px !important;      
    min-height: 40px !important;
    border-radius: 6px;
  }
  
  .plus { background: #059669; color: white; flex: 1.8; } 
  .plus-sosta { background: #2563eb; color: white; flex: 1.8; } 
  .minus { background: #dc2626; color: white; flex: 1; } 

  .btn-appiedati {
    background: #1d4ed8;
    color: white;
    width: 100%;
    height: 42px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 10px;
    text-transform: uppercase;
    margin-bottom: 6px;
    border: 1px solid #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
  }

  /* REPARTO FOOTER COMANDI BLINDATO */
  .footer {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  
  .summary { 
    font-size: 12px; 
    background: #020617; 
    padding: 6px 10px; 
    border-radius: 8px; 
    text-align: left; 
    white-space: pre-line; 
    border: 1px solid #1e293b;
    color: #38bdf8; 
    font-family: monospace;
    height: 34px;
    min-height: 34px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
  }
  body.dark-eclipse .summary {
    background: #050505;
    border-color: #111;
    color: #0ea5e9;
  }
  
  /* I 3 TASTI CON ICONE DELLA STESSA ALTEZZA DELLA V1 ORIGINALE */
  .action-btns { 
    display: flex; 
    gap: 6px; 
    height: 46px; 
  }
  .whatsapp { background: #16a34a; color: white; flex: 1.5; font-size: 15px; border-radius: 8px; text-transform: uppercase; }
  .undo { background: #4b5563; color: white; flex: 1; font-size: 18px; border-radius: 8px; }
  .reset { background: #b45309; color: white; flex: 1; font-size: 18px; border-radius: 8px; }

  /* POPUP MODAL APPIEDATI */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 15px;
    box-sizing: border-box;
  }
  .modal-content {
    background: var(--bg-main);
    width: 100%;
    max-width: 400px;
    border-radius: 16px;
    padding: 15px;
    border: 2px solid var(--border-card);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn-chiudi-modal {
    background: #0f766e;
    color: white;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 10px;
    text-transform: uppercase;
  }
</style>
</head>
