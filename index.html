<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ultra Hub Counter</title>
<style>
  :root {
    --bg-main: #000000;
    --bg-card: #141414;
    --border-card: #262626;
    --text-title: #94a3b8;
    --text-main: #f8fafc;
    --accent-tr: #059669;  /* Verde */
    --accent-pdc: #7c3aed; /* Viola */
    --accent-ap: #1d4ed8;  /* Blu */
    --accent-so: #2563eb;  /* Blu Sosta */
  }

  body.red-mode {
    --bg-card: #1c0505;
    --border-card: #450a0a;
    --text-title: #fca5a5;
    --text-main: #fee2e2;
    --accent-tr: #064e3b;
    --accent-pdc: #581c87;
    --accent-ap: #1e3a8a;
    --accent-so: #1e3a8a;
  }

  html, body {
    background-color: #000000;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text-main);
    -webkit-user-select: none;
    user-select: none;
    box-sizing: border-box;
    height: 100vh;
    overflow: hidden;
  }

  .watch-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    padding: 4px 4px calc(12px + env(safe-area-inset-bottom)) 4px;
    box-sizing: border-box;
  }

  .watch-screen.active {
    display: flex;
  }

  /* HEADER COMPATTO */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 20px;
    margin-bottom: 4px;
    flex-shrink: 0;
  }
  .header h2 { font-size: 11px; margin: 0; color: var(--text-title); text-transform: uppercase; }
  
  .nav-header {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 22px;
    margin-bottom: 4px;
    flex-shrink: 0;
  }
  
  /* PULSANTI */
  button {
    border: 0;
    font-weight: bold;
    touch-action: manipulation;
    cursor: pointer;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  button:active { opacity: 0.6; }

  .btn-mode {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 9px;
  }

  .btn-back {
    background: #262626;
    color: #fff;
    width: 28px;
    height: 20px;
    font-size: 11px;
    border-radius: 6px;
  }

  /* GRID HUB INIZIALE (Tasti Giganti) */
  .hub-grid {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-grow: 1;
  }
  
  .btn-hub {
    flex: 1;
    width: 100%;
    font-size: 11px;
    text-transform: uppercase;
    color: white;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .btn-hub span { font-size: 14px; font-weight: 900; }

  .tr-bg { background: var(--accent-tr); }
  .pdc-bg { background: var(--accent-pdc); }
  .ap-bg { background: var(--accent-ap); }
  .so-bg { background: var(--accent-so); }

  /* SOTTO-SCHERMATE OPERATIVE */
  .sub-container {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-grow: 1;
    overflow-y: auto;
  }

  .counter-row {
    display: flex;
    gap: 4px;
    height: 46px;
    flex-shrink: 0;
  }

  .btn-minus { background: #262626; color: #ef4444; width: 28%; font-size: 18px; }
  .btn-plus { width: 72%; color: white; flex-direction: column; padding: 2px; }
  body.red-mode .btn-minus { background: #3b0707; color: #fca5a5; }

  .c-label { font-size: 9px; text-transform: uppercase; opacity: 0.9; }
  .c-num { font-size: 20px; font-weight: 900; line-height: 1; }

  /* COMPARTI OUTPUT */
  .summary-box {
    background: #070707;
    border: 1px solid #161616;
    border-radius: 8px;
    padding: 6px;
    font-size: 10px;
    font-family: monospace;
    text-align: left;
    white-space: pre-line;
    color: #38bdf8;
    flex-grow: 1;
    overflow-y: auto;
  }
  body.red-mode .summary-box { background: #110202; border-color: #2d0606; color: #f87171; }

  .footer-actions { display: flex; gap: 4px; height: 38px; flex-shrink: 0; margin-top: 4px; }
  .btn-action { font-size: 12px; color: white; flex: 1; }
  .wsp { background: #16a34a; }
  .cpy { background: #0284c7; }
  .cpy.success { background: #15803d !important; }
  .und { background: #4b5563; flex: 0.5; }
  .rst { background: #b45309; flex: 0.5; }

  body.red-mode .wsp { background: #064e3b; color: #a7f3d0; }
  body.red-mode .cpy { background: #0369a1; color: #bae6fd; }
  body.red-mode .und { background: #3f3f46; color: #d4d4d8; }
  body.red-mode .rst { background: #7c2d12; color: #ffedd5; }
</style>
</head>
<body>

<!-- 1. SCHERMATA INIZIALE (HUB) -->
<div class="watch-screen active" id="screen-hub">
  <div class="header">
    <h2>Menu Principale</h2>
    <button class="btn-mode" onclick="toggleModalita()">🔴</button>
  </div>
  <div class="hub-grid">
    <button class="btn-hub tr-bg" onclick="vaiA('screen-transito')">Occ. Transito <span id="hub-tg">0</span></button>
    <button class="btn-hub pdc-bg" onclick="vaiA('screen-pdc')">Posto Controllo <span id="hub-pdc">0</span></button>
    <button class="btn-hub ap-bg" onclick="vaiA('screen-appiedati')">Appiedati <span id="hub-ap">0</span></button>
    <button class="btn-hub so-bg" onclick="vaiA('screen-sosta')">Targhe Sosta <span id="hub-so">0</span></button>
  </div>
  <div class="footer-actions">
    <button class="btn-action und" id="hub-undo" onclick="annulla()" style="opacity:0.3;">↩︎</button>
    <button class="btn-action cpy" id="hub-copia" onclick="copiaTesto()">📋 Report</button>
    <button class="btn-action rst" onclick="azzera()">🗑️</button>
  </div>
</div>

<!-- 2. SCHERMATA: OCCUPANTI TRANSITO -->
<div class="watch-screen" id="screen-transito">
  <div class="nav-header">
    <button class="btn-back" onclick="vaiA('screen-hub')">◀</button>
    <span class="c-label">Transito</span>
  </div>
  <div class="sub-container">
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('tg',-1)">-</button>
      <button class="btn-plus tr-bg" onclick="cambia('tg',1)">
        <span class="c-label">Totale Occupanti</span><span class="c-num" id="val-tg">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('itaPos',-1)">-</button>
      <button class="btn-plus tr-bg" onclick="cambia('itaPos',1)">
        <span class="c-label">Ita Pos</span><span class="c-num" id="val-itaPos">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('itaNeg',-1)">-</button>
      <button class="btn-plus tr-bg" onclick="cambia('itaNeg',1)">
        <span class="c-label">Ita Neg</span><span class="c-num" id="val-itaNeg">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('straPos',-1)">-</button>
      <button class="btn-plus tr-bg" onclick="cambia('straPos',1)">
        <span class="c-label">Stra Pos</span><span class="c-num" id="val-straPos">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('straNeg',-1)">-</button>
      <button class="btn-plus tr-bg" onclick="cambia('straNeg',1)">
        <span class="c-label">Stra Neg</span><span class="c-num" id="val-straNeg">0</span>
      </button>
    </div>
  </div>
</div>

<!-- 3. SCHERMATA: POSTO DI CONTROLLO -->
<div class="watch-screen" id="screen-pdc">
  <div class="nav-header">
    <button class="btn-back" onclick="vaiA('screen-hub')">◀</button>
    <span class="c-label">Posto di Controllo</span>
  </div>
  <div class="sub-container">
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('pdcTg',-1)">-</button>
      <button class="btn-plus pdc-bg" onclick="cambia('pdcTg',1)">
        <span class="c-label">Veicoli Controllati</span><span class="c-num" id="val-pdcTg">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('pdcItaPos',-1)">-</button>
      <button class="btn-plus pdc-bg" onclick="cambia('pdcItaPos',1)">
        <span class="c-label">PdC Ita Pos</span><span class="c-num" id="val-pdcItaPos">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('pdcItaNeg',-1)">-</button>
      <button class="btn-plus pdc-bg" onclick="cambia('pdcItaNeg',1)">
        <span class="c-label">PdC Ita Neg</span><span class="c-num" id="val-pdcItaNeg">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('pdcStraPos',-1)">-</button>
      <button class="btn-plus pdc-bg" onclick="cambia('pdcStraPos',1)">
        <span class="c-label">PdC Stra Pos</span><span class="c-num" id="val-pdcStraPos">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('pdcStraNeg',-1)">-</button>
      <button class="btn-plus pdc-bg" onclick="cambia('pdcStraNeg',1)">
        <span class="c-label">PdC Stra Neg</span><span class="c-num" id="val-pdcStraNeg">0</span>
      </button>
    </div>
  </div>
</div>

<!-- 4. SCHERMATA: APPIEDATI -->
<div class="watch-screen" id="screen-appiedati">
  <div class="nav-header">
    <button class="btn-back" onclick="vaiA('screen-hub')">◀</button>
    <span class="c-label">Appiedati</span>
  </div>
  <div class="sub-container">
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('apItaPos',-1)">-</button>
      <button class="btn-plus ap-bg" onclick="cambia('apItaPos',1)">
        <span class="c-label">App Ita Pos</span><span class="c-num" id="val-apItaPos">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('apItaNeg',-1)">-</button>
      <button class="btn-plus ap-bg" onclick="cambia('apItaNeg',1)">
        <span class="c-label">App Ita Neg</span><span class="c-num" id="val-apItaNeg">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('apStraPos',-1)">-</button>
      <button class="btn-plus ap-bg" onclick="cambia('apStraPos',1)">
        <span class="c-label">App Stra Pos</span><span class="c-num" id="val-apStraPos">0</span>
      </button>
    </div>
    <div class="counter-row">
      <button class="btn-minus" onclick="cambia('apStraNeg',-1)">-</button>
      <button class="btn-plus ap-bg" onclick="cambia('apStraNeg',1)">
        <span class="c-label">App Stra Neg</span><span class="c-num" id="val-apStraNeg">0</span>
      </button>
    </div>
  </div>
</div>

<!-- 5. SCHERMATA: TARGHE SOSTA -->
<div class="watch-screen" id="screen-sosta">
  <div class="nav-header">
    <button class="btn-back" onclick="vaiA('screen-hub')">◀</button>
    <span class="c-label">Sosta</span>
  </div>
  <div class="sub-container">
    <div class="counter-row" style="height: 80px;">
      <button class="btn-minus" onclick="cambia('tgSosta',-1)">-</button>
      <button class="btn-plus so-bg" onclick="cambia('tgSosta',1)">
        <span class="c-label" style="font-size:11px;">Targhe in Sosta</span>
        <span class="c-num" style="font-size:32px;" id="val-tgSosta">0</span>
      </button>
    </div>
    <div class="summary-box" id="riepilogo">Nessun dato</div>
  </div>
</div>

<script>
let datiSalvati = JSON.parse(localStorage.getItem("hubWatchV1")) || {};
let dati = {
  tgSosta: Number(datiSalvati.tgSosta) || 0, tg: Number(datiSalvati.tg) || 0,
  itaNeg: Number(datiSalvati.itaNeg) || 0, itaPos: Number(datiSalvati.itaPos) || 0,
  straPos: Number(datiSalvati.straPos) || 0, straNeg: Number(datiSalvati.straNeg) || 0,
  apItaNeg: Number(datiSalvati.apItaNeg) || 0, apItaPos: Number(datiSalvati.apItaPos) || 0,
  apStraPos: Number(datiSalvati.apStraPos) || 0, apStraNeg: Number(datiSalvati.apStraNeg) || 0,
  pdcTg: Number(datiSalvati.pdcTg) || 0, pdcItaNeg: Number(datiSalvati.pdcItaNeg) || 0,
  pdcItaPos: Number(datiSalvati.pdcItaPos) || 0, pdcStraPos: Number(datiSalvati.pdcStraPos) || 0,
  pdcStraNeg: Number(datiSalvati.pdcStraNeg) || 0
};

let cronologiaAzioni = [];

function feedback() { if (navigator.vibrate) navigator.vibrate(22); }

if (localStorage.getItem("hubWatchTattico") === "true") document.body.classList.add("red-mode");

function toggleModalita() {
  feedback();
  const isRed = document.body.classList.toggle("red-mode");
  localStorage.setItem("hubWatchTattico", isRed);
}

function vaiA(screenId) {
  feedback();
  document.querySelectorAll('.watch-screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

function cambia(k, v) {
  feedback();
  cronologiaAzioni.push({ chiave: k, valorePrecedente: dati[k] });
  if (cronologiaAzioni.length > 20) cronologiaAzioni.shift();
  dati[k] = Math.max(0, dati[k] + v);
  localStorage.setItem("hubWatchV1", JSON.stringify(dati));
  aggiornaInterfaccia();
}

function annulla() {
  if (cronologiaAzioni.length === 0) return;
  feedback();
  let ultima = cronologiaAzioni.pop();
  dati[ultima.chiave] = ultima.valorePrecedente;
  localStorage.setItem("hubWatchV1", JSON.stringify(dati));
  aggiornaInterfaccia();
}

function generaReport(usaGrassetto = false) {
  let macro = [];
  const b = usaGrassetto ? "*" : "";
  
  let detPdc = [];
  if (dati.pdcItaNeg > 0) detPdc.push(`${b}${dati.pdcItaNeg}${b} ita neg`);
  if (dati.pdcItaPos > 0) detPdc.push(`${b}${dati.pdcItaPos}${b} ita pos`);
  if (dati.pdcStraPos > 0) detPdc.push(`${b}${dati.pdcStraPos}${b} stra pos`);
  if (dati.pdcStraNeg > 0) detPdc.push(`${b}${dati.pdcStraNeg}${b} stra neg`);
  if (detPdc.length > 0) macro.push(`${b}POSTO DI CONTROLLO:${b} ${b}${dati.pdcTg}${b} tg con ${detPdc.join(", ")}`);
  else if (dati.pdcTg > 0) macro.push(`${b}POSTO DI CONTROLLO:${b} ${b}${dati.pdcTg}${b} tg`);

  let detAp = [];
  if (dati.apItaNeg > 0) detAp.push(`${b}${dati.apItaNeg}${b} ita neg`);
  if (dati.apItaPos > 0) detAp.push(`${b}${dati.apItaPos}${b} ita pos`);
  if (dati.apStraPos > 0) detAp.push(`${b}${dati.apStraPos}${b} stra pos`);
  if (dati.apStraNeg > 0) detAp.push(`${b}${dati.apStraNeg}${b} stra neg`);
  if (detAp.length > 0) macro.push(detAp.join(", "));
  
  if (dati.tgSosta > 0) macro.push(`${b}${dati.tgSosta}${b} tg`);
  
  let detTr = [];
  if (dati.itaNeg > 0) detTr.push(`${b}${dati.itaNeg}${b} ita neg`);
  if (dati.itaPos > 0) detTr.push(`${b}${dati.itaPos}${b} ita pos`);
  if (dati.straPos > 0) detTr.push(`${b}${dati.straPos}${b} stra pos`);
  if (dati.straNeg > 0) detTr.push(`${b}${dati.straNeg}${b} stra neg`);
  if (detTr.length > 0) macro.push(`${b}${dati.tg}${b} tg con ${detTr.join(", ")}`);
  else if (dati.tg > 0) macro.push(`${b}${dati.tg}${b} tg`);

  return macro.length > 0 ? macro.join("\n\n") : "Nessun dato";
}

function aggiornaInterfaccia() {
  // Aggiorna valori schermate interne
  for (let k in dati) {
    let el = document.getElementById(`val-${k}`);
    if(el) el.innerText = dati[k];
  }
  
  // Aggiorna macro-numeri sull'Hub principale
  document.getElementById("hub-tg").innerText = dati.tg;
  document.getElementById("hub-pdc").innerText = dati.pdcTg;
  document.getElementById("hub-ap").innerText = dati.apItaPos + dati.apItaNeg + dati.apStraPos + dati.apStraNeg;
  document.getElementById("hub-so").innerText = dati.tgSosta;

  document.getElementById("riepilogo").innerText = generaReport(false);
  document.getElementById("hub-undo").style.opacity = cronologiaAzioni.length > 0 ? "1" : "0.3";
}

function copiaTesto() {
  feedback();
  navigator.clipboard.writeText(generaReport(true)).then(() => {
    const btn = document.getElementById("hub-copia");
    btn.classList.add("success");
    let prev = btn.innerText;
    btn.innerText = "✅ Copiato";
    setTimeout(() => { btn.classList.remove("success"); btn.innerText = prev; }, 1000);
  });
}

function azzera() {
  feedback();
  if (confirm("Azzera tutto?")) {
    for (let k in dati) dati[k] = 0;
    cronologiaAzioni = [];
    localStorage.setItem("hubWatchV1", JSON.stringify(dati));
    aggiornaInterfaccia();
  }
}

aggiornaInterfaccia();
</script>
</body>
</html>
