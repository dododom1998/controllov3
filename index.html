<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Contatore Watch OS</title>
<style>
  :root {
    --bg-main: #000000;
    --bg-card: #121212;
    --border-card: #222222;
    --text-title: #888888;
    --pos-highlight: #450a0a;
    --pos-border: #7f1d1d;
    --text-main: #f8fafc;
    --accent: #0ea5e9;
  }

  body.red-mode {
    --bg-card: #1a0505;
    --border-card: #3b0707;
    --text-title: #991b1b;
    --pos-highlight: #5c0707;
    --pos-border: #991b1b;
    --text-main: #fca5a5;
    --accent: #ef4444;
  }

  html, body {
    background-color: #000000;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text-main);
    -webkit-user-select: none;
    user-select: none;
    box-sizing: border-box;
  }

  /* Scorrimento fluido per la Digital Crown */
  .watch-container {
    padding: 6px 4px calc(20px + env(safe-area-inset-bottom)) 4px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* HEADER COMPATTO */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
    height: 20px;
  }
  .header h2 { font-size: 11px; margin: 0; color: var(--text-title); text-transform: uppercase; }
  .btn-mode {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  body.red-mode .btn-mode { color: #ef4444; }

  /* SEZIONI SCHERMO */
  .section-divider {
    font-size: 10px;
    font-weight: bold;
    color: var(--accent);
    text-transform: uppercase;
    text-align: left;
    padding-left: 4px;
    margin-top: 4px;
    border-left: 2px solid var(--accent);
  }

  /* RIGA CONTATORE APPIATTITA */
  .watch-row {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: 10px;
    display: flex;
    align-items: center;
    height: 46px;
    overflow: hidden;
  }
  .watch-row.highlight {
    background: var(--pos-highlight);
    border-color: var(--pos-border);
  }

  .row-label {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }
  .row-label h3 { margin: 0; font-size: 10px; color: var(--text-title); text-transform: uppercase; }
  .row-label .num { font-size: 20px; font-weight: 800; color: #fff; line-height: 1.1; }
  body.red-mode .row-label .num { color: var(--text-main); }

  /* PULSANTI OPERATIVI */
  button {
    border: 0;
    height: 100%;
    font-weight: bold;
    touch-action: manipulation;
    cursor: pointer;
  }
  button:active { opacity: 0.7; }

  .btn-minus { background: #262626; color: #ef4444; width: 38px; font-size: 14px; }
  .btn-plus { background: #059669; color: white; width: 52px; font-size: 16px; }
  .btn-plus-sosta { background: #2563eb; color: white; width: 52px; font-size: 16px; }

  body.red-mode .btn-minus { background: #2d0606; color: #fca5a5; }
  body.red-mode .btn-plus { background: #064e3b; color: #a7f3d0; }
  body.red-mode .btn-plus-sosta { background: #1e3a8a; color: #bfdbfe; }

  /* AREA UTILITY IN FONDO */
  .summary-box {
    background: #090909;
    border: 1px solid #151515;
    border-radius: 8px;
    padding: 6px;
    font-size: 10px;
    font-family: monospace;
    text-align: left;
    white-space: pre-line;
    color: #0ea5e9;
  }
  body.red-mode .summary-box { background: #0f0202; border-color: #250404; color: #f87171; }

  .footer-actions {
    display: flex;
    gap: 4px;
    height: 40px;
  }
  .btn-action { font-size: 11px; border-radius: 8px; color: white; display: flex; align-items: center; justify-content: center; flex: 1; }
  .wsp { background: #16a34a; }
  .cpy { background: #0284c7; }
  .cpy.success { background: #15803d !important; }
  .und { background: #4b5563; flex: 0.5; font-size: 14px; }
  .rst { background: #b45309; flex: 0.5; font-size: 14px; }

  body.red-mode .wsp { background: #064e3b; color: #a7f3d0; }
  body.red-mode .cpy { background: #0369a1; color: #bae6fd; }
  body.red-mode .und { background: #3f3f46; color: #d4d4d8; }
  body.red-mode .rst { background: #7c2d12; color: #ffedd5; }
</style>
</head>
<body>

<div class="watch-container">
  
  <!-- HEADER -->
  <div class="header">
    <h2>Memb. Ultra V1</h2>
    <button class="btn-mode" id="mode-icon" onclick="toggleModalita()">🔴</button>
  </div>

  <!-- SEZIONE: TRANSITO / SOSTA -->
  <div class="section-divider">Transito / Sosta</div>
  
  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('tgSosta',-1)">-</button>
    <div class="row-label"><h3>Targhe S.</h3><div class="num" id="val-tgSosta">0</div></div>
    <button class="btn-plus-sosta" onclick="cambia('tgSosta',1)">+S</button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('tg',-1)">-</button>
    <div class="row-label"><h3>Occ. Tra.</h3><div class="num" id="val-tg">0</div></div>
    <button class="btn-plus" onclick="cambia('tg',1)">+O</button>
  </div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('itaPos',-1)">-</button>
    <div class="row-label"><h3>Ita Pos</h3><div class="num" id="val-itaPos">0</div></div>
    <button class="btn-plus" onclick="cambia('itaPos',1)">+1</button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('itaNeg',-1)">-</button>
    <div class="row-label"><h3>Ita Neg</h3><div class="num" id="val-itaNeg">0</div></div>
    <button class="btn-plus" onclick="cambia('itaNeg',1)">+1</button>
  </div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('straPos',-1)">-</button>
    <div class="row-label"><h3>Stra Pos</h3><div class="num" id="val-straPos">0</div></div>
    <button class="btn-plus" onclick="cambia('straPos',1)">+1</button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('straNeg',-1)">-</button>
    <div class="row-label"><h3>Stra Neg</h3><div class="num" id="val-straNeg">0</div></div>
    <button class="btn-plus" onclick="cambia('straNeg',1)">+1</button>
  </div>

  <!-- SEZIONE: POSTO DI CONTROLLO -->
  <div class="section-divider">Posto di Controllo</div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('pdcTg',-1)">-</button>
    <div class="row-label"><h3>Veicoli PdC</h3><div class="num" id="val-pdcTg">0</div></div>
    <button class="btn-plus" onclick="cambia('pdcTg',1)">+1</button>
  </div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('pdcItaPos',-1)">-</button>
    <div class="row-label"><h3>PdC Ita P</h3><div class="num" id="val-pdcItaPos">0</div></div>
    <button class="btn-plus" onclick="cambia('pdcItaPos',1)">+1</button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('pdcItaNeg',-1)">-</button>
    <div class="row-label"><h3>PdC Ita N</h3><div class="num" id="val-pdcItaNeg">0</div></div>
    <button class="btn-plus" onclick="cambia('pdcItaNeg',1)">+1</button>
  </div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('pdcStraPos',-1)">-</button>
    <div class="row-label"><h3>PdC Str P</h3><div class="num" id="val-pdcStraPos">0</div></div>
    <button class="btn-plus" onclick="cambia('pdcStraPos',1)">+1</button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('pdcStraNeg',-1)">-</button>
    <div class="row-label"><h3>PdC Str N</h3><div class="num" id="val-pdcStraNeg">0</div></div>
    <button class="btn-plus" onclick="cambia('pdcStraNeg',1)">+1</button>
  </div>

  <!-- SEZIONE: APPIEDATI -->
  <div class="section-divider">Appiedati</div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('apItaPos',-1)">-</button>
    <div class="row-label"><h3>App Ita P</h3><div class="num" id="val-apItaPos">0</div></div>
    <button class="btn-plus" onclick="cambia('apItaPos',1)">+1</button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('apItaNeg',-1)">-</button>
    <div class="row-label"><h3>App Ita N</h3><div class="num" id="val-apItaNeg">0</div></div>
    <button class="btn-plus" onclick="cambia('apItaNeg',1)">+1</button>
  </div>

  <div class="watch-row highlight">
    <button class="btn-minus" onclick="cambia('apStraPos',-1)">-</button>
    <div class="row-label"><h3>App Str P</h3><div class="num" id="val-apStraPos">0</div></div>
    <button class="btn-plus" onclick="cambia('apStraPos',1)">+1</button>
  </div>

  <div class="watch-row">
    <button class="btn-minus" onclick="cambia('apStraNeg',-1)">-</button>
    <div class="row-label"><h3>App Str N</h3><div class="num" id="val-apStraNeg">0</div></div>
    <button class="btn-plus" onclick="cambia('apStraNeg',1)">+1</button>
  </div>

  <!-- UTILITY E REPORT -->
  <div class="section-divider">Output</div>
  <div class="summary-box" id="riepilogo">Nessun dato</div>

  <div class="footer-actions">
    <button class="btn-action und" id="btn-undo" onclick="annulla()" style="opacity:0.3;">↩︎</button>
    <button class="btn-action wsp" onclick="inviaWhatsApp()">💬</button>
    <button class="btn-action cpy" id="btn-copia" onclick="copiaTesto()">📋</button>
    <button class="btn-action rst" onclick="azzera()">🗑️</button>
  </div>

</div>

<script>
let datiSalvati = JSON.parse(localStorage.getItem("watchContatoreV1")) || {};
let dati = {
  tgSosta: Number(datiSalvati.tgSosta) || 0, tg: Number(datiSalvati.tg) || 0,
  itaNeg: Number(datiSalvati.itaNeg) || 0, itaPos: Number(datiSalvati.itaPos) || 0,
  straPos: Number(datiSalvati.straPos) || 0, straNeg: Number(datiSalvati.straNeg) || 0,
  apItaNeg: Number(datiSalvati.apItaNeg) || 0, apItaPos: Number(datiSalvati.apItaPos) || 0,
  apStraPos: Number(datiSalvati.apStraPos) || 0, apStraNeg: Number(datiSalvati.apStraNeg) || 0,
  pdcTg: Number(datiSalvati.pdcTg) || 0, pdcItaNeg: Number(datiSalvati.pdcItaNeg) || 0,
  pdcItaPos: Number(datiSalvati.pdcItaPos) || 0, pdcStraPos: Number(datiSalvati.pdcStraPos) || 0,
  pdcStraNeg: Number(datiSalvati.pdcStraNeg) || 0
};

let cronologiaAzioni = [];

function feedbackTattico() {
  if (navigator.vibrate) navigator.vibrate(20);
}

if (localStorage.getItem("watchTattico") === "true") {
  document.body.classList.add("red-mode");
  document.getElementById("mode-icon").innerText = "⚫";
}

function toggleModalita() {
  feedbackTattico();
  const isRed = document.body.classList.toggle("red-mode");
  document.getElementById("mode-icon").innerText = isRed ? "⚫" : "🔴";
  localStorage.setItem("watchTattico", isRed);
}

function cambia(k, v) {
  feedbackTattico();
  cronologiaAzioni.push({ chiave: k, valorePrecedente: dati[k] });
  if (cronologiaAzioni.length > 15) cronologiaAzioni.shift();
  dati[k] = Math.max(0, dati[k] + v);
  localStorage.setItem("watchContatoreV1", JSON.stringify(dati));
  aggiornaSchermata();
}

function annulla() {
  if (cronologiaAzioni.length === 0) return;
  feedbackTattico();
  let ultima = cronologiaAzioni.pop();
  dati[ultima.chiave] = ultima.valorePrecedente;
  localStorage.setItem("watchContatoreV1", JSON.stringify(dati));
  aggiornaSchermata();
}

function generaReport(usaGrassetto = false) {
  let macro = [];
  const b = usaGrassetto ? "*" : "";
  
  let detPdc = [];
  if (dati.pdcItaNeg > 0) detPdc.push(`${b}${dati.pdcItaNeg}${b} ita neg`);
  if (dati.pdcItaPos > 0) detPdc.push(`${b}${dati.pdcItaPos}${b} ita pos`);
  if (dati.pdcStraPos > 0) detPdc.push(`${b}${dati.pdcStraPos}${b} stra pos`);
  if (dati.pdcStraNeg > 0) detPdc.push(`${b}${dati.pdcStraNeg}${b} stra neg`);
  
  if (detPdc.length > 0) macro.push(`${b}POSTO DI CONTROLLO:${b} ${b}${dati.pdcTg}${b} tg con ${detPdc.join(", ")}`);
  else if (dati.pdcTg > 0) macro.push(`${b}POSTO DI CONTROLLO:${b} ${b}${dati.pdcTg}${b} tg`);

  let detAp = [];
  if (dati.apItaNeg > 0) detAp.push(`${b}${dati.apItaNeg}${b} ita neg`);
  if (dati.apItaPos > 0) detAp.push(`${b}${dati.apItaPos}${b} ita pos`);
  if (dati.apStraPos > 0) detAp.push(`${b}${dati.apStraPos}${b} stra pos`);
  if (dati.apStraNeg > 0) detAp.push(`${b}${dati.apStraNeg}${b} stra neg`);
  if (detAp.length > 0) macro.push(detAp.join(", "));
  
  if (dati.tgSosta > 0) macro.push(`${b}${dati.tgSosta}${b} tg`);
  
  let detTr = [];
  if (dati.itaNeg > 0) detTr.push(`${b}${dati.itaNeg}${b} ita neg`);
  if (dati.itaPos > 0) detTr.push(`${b}${dati.itaPos}${b} ita pos`);
  if (dati.straPos > 0) detTr.push(`${b}${dati.straPos}${b} stra pos`);
  if (dati.straNeg > 0) detTr.push(`${b}${dati.straNeg}${b} stra neg`);
  
  if (detTr.length > 0) macro.push(`${b}${dati.tg}${b} tg con ${detTr.join(", ")}`);
  else if (dati.tg > 0) macro.push(`${b}${dati.tg}${b} tg`);

  return macro.length > 0 ? macro.join("\n\n") : "Nessun dato";
}

function aggiornaSchermata() {
  for (let k in dati) {
    let el = document.getElementById(`val-${k}`);
    if(el) el.innerText = dati[k];
  }
  document.getElementById("riepilogo").innerText = generaReport(false);
  document.getElementById("btn-undo").style.opacity = cronologiaAzioni.length > 0 ? "1" : "0.3";
}

function inviaWhatsApp() {
  feedbackTattico();
  window.location.href = "whatsapp://send?text=" + encodeURIComponent(generaReport(true));
}

function copiaTesto() {
  feedbackTattico();
  navigator.clipboard.writeText(generaReport(true)).then(() => {
    const btn = document.getElementById("btn-copia");
    btn.classList.add("success");
    setTimeout(() => { btn.classList.remove("success"); }, 1000);
  });
}

function azzera() {
  feedbackTattico();
  if (confirm("Azzera tutto?")) {
    for (let k in dati) dati[k] = 0;
    cronologiaAzioni = [];
    localStorage.setItem("watchContatoreV1", JSON.stringify(dati));
    aggiornaSchermata();
  }
}
aggiornaSchermata();
</script>
</body>
</html>
